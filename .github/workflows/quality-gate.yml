name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, build, test, accessibility, and Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          set +e
          echo "Node $(node --version)"
          echo "npm $(npm --version)"
          npm ci --no-audit --no-fund 2>&1 | tee npm-ci.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            {
              echo "npm ci failed with exit code $status."
              echo
              tail -n 80 npm-ci.log
            } > npm-ci-summary.txt
            message=$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' npm-ci-summary.txt)
            echo "::error title=npm ci failed::$message"
            exit "$status"
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility checks
        run: npm run test:a11y

      - name: Run full automated quality gate
        run: npm run test:quality

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            npm-ci.log
            playwright-report/
            test-results/
          if-no-files-found: ignore
